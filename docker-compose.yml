services:
  postgres:
    image: postgres:15.13-alpine
    container_name: lila-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nakama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-nakama}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nakama} -d ${POSTGRES_DB:-nakama}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nakama-migrate:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.38.0
    container_name: lila-nakama-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - migrate
      - up
      - --database.address
      - postgres://${POSTGRES_USER:-nakama}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-nakama}?sslmode=disable
    restart: "no"

  nakama:
    build:
      context: .
      dockerfile: docker/nakama/Dockerfile
    container_name: lila-nakama
    depends_on:
      postgres:
        condition: service_healthy
      nakama-migrate:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        exec /nakama/nakama
        --name ${NAKAMA_NAME:-lila-nakama}
        --database.address postgres://${POSTGRES_USER:-nakama}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-nakama}?sslmode=disable
        --runtime.path /nakama/data/modules
        --logger.level ${NAKAMA_LOG_LEVEL:-INFO}
        --runtime.http_key ${NAKAMA_HTTP_KEY:?NAKAMA_HTTP_KEY is required}
        --socket.server_key ${NAKAMA_SOCKET_SERVER_KEY:?NAKAMA_SOCKET_SERVER_KEY is required}
        --session.encryption_key ${NAKAMA_SESSION_ENCRYPTION_KEY:?NAKAMA_SESSION_ENCRYPTION_KEY is required}
        --session.token_expiry_sec ${NAKAMA_SESSION_TOKEN_EXPIRY_SEC:-900}
        --session.refresh_encryption_key ${NAKAMA_REFRESH_ENCRYPTION_KEY:?NAKAMA_REFRESH_ENCRYPTION_KEY is required}
        --session.refresh_token_expiry_sec ${NAKAMA_REFRESH_TOKEN_EXPIRY_SEC:-2592000}
        --console.username ${NAKAMA_CONSOLE_USERNAME:-admin}
        --console.password ${NAKAMA_CONSOLE_PASSWORD:?NAKAMA_CONSOLE_PASSWORD is required}
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres_data:
