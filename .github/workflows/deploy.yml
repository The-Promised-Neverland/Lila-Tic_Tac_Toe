name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: ${{ secrets.EC2_APP_DIR }}
          rm: true

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            cat > .env <<'EOF'
            POSTGRES_DB=nakama
            POSTGRES_USER=nakama
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            NAKAMA_NAME=lila-nakama
            NAKAMA_LOG_LEVEL=INFO
            NAKAMA_HTTP_KEY=${{ secrets.NAKAMA_HTTP_KEY }}
            NAKAMA_SOCKET_SERVER_KEY=${{ secrets.NAKAMA_SOCKET_SERVER_KEY }}
            NAKAMA_SESSION_ENCRYPTION_KEY=${{ secrets.NAKAMA_SESSION_ENCRYPTION_KEY }}
            NAKAMA_SESSION_TOKEN_EXPIRY_SEC=900
            NAKAMA_REFRESH_ENCRYPTION_KEY=${{ secrets.NAKAMA_REFRESH_ENCRYPTION_KEY }}
            NAKAMA_REFRESH_TOKEN_EXPIRY_SEC=2592000
            NAKAMA_CONSOLE_USERNAME=admin
            NAKAMA_CONSOLE_PASSWORD=${{ secrets.NAKAMA_CONSOLE_PASSWORD }}
            EOF
            docker compose up -d --build
